# PR gate: type-check + build the frontend and assert it stays Summit-bound.
# `npm run build` runs `tsc -b` (type-check) then `vite build`, so this covers
# both. No deploy here — that lives in deploy-summit.yml on push to main.
name: CI

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        name: Type-check & build
        runs-on: ubuntu-latest
        env:
            NODE_OPTIONS: "--max-old-space-size=8192"
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: npm install --no-audit --no-fund

            - name: Build (tsc -b && vite build)
              run: npm run build

            # Aligned with deploy-summit.yml: assert the SUMMIT descriptor positively
            # and check only the app-selected `paseo_asset_hub` descriptor. Endpoint
            # strings (paseo-*-next) are legitimately baked into Summit builds by
            # product-sdk (>=0.15) and must not be grepped — false failures.
            - name: Assert bundle targets Summit (not Paseo asset hub)
              run: |
                  if ! grep -rIl "summit_asset_hub" dist/ >/dev/null; then
                    echo "::error::Built bundle is missing the Summit asset-hub descriptor — Summit retarget regressed."
                    exit 1
                  fi
                  if grep -rIl "paseo_asset_hub" dist/ >/dev/null; then
                    echo "::error::Built bundle selects the Paseo asset-hub descriptor — Summit retarget regressed."
                    exit 1
                  fi
                  echo "✓ dist/ targets the Summit asset hub"
